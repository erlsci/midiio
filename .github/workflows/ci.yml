name: ci

# Cross-platform gate: build + load the NIF, run the full rebar3 test check, and
# run the ASan harness across the supported OTP range on Linux and macOS.
#
# OTP FLOOR = 24. The device resource type registers a `down` callback via
# `enif_init_resource_type` (the `ErlNifResourceTypeInit` members/dyncall form),
# which is an OTP-24 API — midiio cannot compile on OTP < 24. `rebar.config` pins
# `{minimum_otp_vsn, "24"}` to enforce it.
#
# OS/version availability constraints (empirical — adjust if a leg can't resolve):
#   * setup-beam's macOS (Apple Silicon) prebuilds start at OTP 25.1, so the
#     OTP-24 floor is exercised on Linux only.
#   * Older OTP isn't built for the newest Ubuntu, so OTP 24/25 run on 22.04.
#   * rebar3 latest ('3') needs a recent OTP; the OTP-24 leg pins a compatible
#     rebar3.

on:
  push:
  pull_request:

jobs:
  check:
    name: OTP ${{ matrix.otp }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # rebar3 only supports the 3 newest OTP majors, so each OTP is pinned to the
      # newest rebar3 release that still supports it (same pinning as erlsci/midilib).
      # A plain '3'/latest resolves to rebar3 3.27, which cannot run on OTP 24/25 —
      # hence the explicit per-OTP pins below.
      matrix:
        include:
          # --- Linux: the full supported range (OTP 24 floor → latest). ---
          - { os: ubuntu-latest, otp: '29', rebar3: '3.27' }
          - { os: ubuntu-latest, otp: '28', rebar3: '3.27' }
          - { os: ubuntu-latest, otp: '27', rebar3: '3.27' }
          - { os: ubuntu-latest, otp: '26', rebar3: '3.25.1' }
          - { os: ubuntu-22.04,  otp: '25', rebar3: '3.24.0' }
          - { os: ubuntu-22.04,  otp: '24', rebar3: '3.21.0' }
          # --- macOS (Apple Silicon): prebuilds available from OTP 25.1. ---
          - { os: macos-latest,  otp: '29', rebar3: '3.27' }
          - { os: macos-latest,  otp: '27', rebar3: '3.27' }
          - { os: macos-latest,  otp: '25', rebar3: '3.24.0' }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ matrix.rebar3 }}

      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # mm_context_init on ALSA calls snd_seq_open, which needs the sequencer
      # device /dev/snd/seq. That device only exists once the snd-seq kernel
      # module is loaded — and GitHub's hosted runners use an Azure-flavoured
      # kernel that ships NO ALSA sound modules, not even in linux-modules-extra
      # (actions/runner-images#8295). A container image can't change this: every
      # container shares the host kernel, so there's no snd-seq.ko to modprobe.
      #
      # So we probe (best-effort) and continue regardless. With no sequencer the
      # eunit runtime rows skip themselves (see runtime/1 in midiio_tests.erl):
      # build, NIF load, and the pure result-map/foreign-handle rows still run on
      # Linux, and macOS/CoreMIDI provides full runtime coverage. The Linux
      # runtime rows light up automatically on any host that does have a real
      # sequencer (self-hosted runner, or a developer's machine).
      - name: Probe for an ALSA sequencer (Linux, best-effort)
        if: runner.os == 'Linux'
        run: |
          sudo modprobe snd-seq snd-virmidi 2>/dev/null || true
          if [ -e /dev/snd/seq ]; then
            sudo chmod 0666 /dev/snd/seq
            echo "ALSA sequencer present; runtime rows will run."
            ls -l /dev/snd/seq
          else
            echo "::notice::no /dev/snd/seq on this runner; ALSA runtime rows skip (deferred)."
          fi

      # Full gate: compile (app + NIF), xref, dialyzer, eunit, coverage. On macOS
      # this is the full green gate; on Linux it additionally exercises
      # context_open and the `alsa` backend atom.
      - name: rebar3 as test check
        run: rebar3 as test check

      # ASan harness over the minimidio context lifecycle. On Linux ASan bundles
      # LeakSanitizer, so this closes the leak half of the lifecycle check.
      - name: ASan harness
        run: make asan
