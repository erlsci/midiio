name: ci

# Cross-platform gate (arc1/slice5 item 5): build + load the NIF, run the full
# rebar3 test check, and run the ASan harness on both Linux and macOS. The Linux
# leg closes the deferred-Linux pile (slice-1 row 3 load, slice-3 row 6 `alsa`
# backend, slice-1 row 16 leak-half via LeakSanitizer) — provided the runner can
# supply an ALSA sequencer (see the snd-virmidi step).

on:
  push:
  pull_request:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            otp: '27'
          - os: macos-latest
            otp: '27'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3'

      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # mm_context_init on ALSA calls snd_seq_open, which needs the sequencer
      # device /dev/snd/seq. A headless runner has no audio hardware, so provide
      # it via the in-kernel virtual sequencer. The snd-seq/snd-virmidi modules
      # ship in linux-modules-extra for the runner's (Azure-flavoured) kernel, so
      # install that package before loading them. snd-seq creates /dev/snd/seq;
      # snd-virmidi adds discoverable virtual ports for the real-hardware row.
      # This is a hard requirement now (not best-effort): if the sequencer is
      # absent the step fails loudly rather than letting the suite hard-fail later.
      - name: Load ALSA virtual sequencer (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y "linux-modules-extra-$(uname -r)"
          sudo modprobe snd-seq
          sudo modprobe snd-virmidi
          # eunit runs as the unprivileged runner user, which isn't in the audio
          # group; open the sequencer device so snd_seq_open succeeds.
          sudo chmod 0666 /dev/snd/seq
          ls -l /dev/snd/seq
          test -e /dev/snd/seq

      # Full gate: compile (app + NIF), xref, dialyzer, eunit, coverage. On macOS
      # this is the same green gate slices 1-3 produce; on Linux it additionally
      # exercises context_open (row 3) and the `alsa` backend atom (row 6).
      - name: rebar3 as test check
        run: rebar3 as test check

      # ASan harness over the minimidio context lifecycle. On Linux ASan bundles
      # LeakSanitizer, so this closes the leak half of slice-1 row 16.
      - name: ASan harness
        run: make asan
