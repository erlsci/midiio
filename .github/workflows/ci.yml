name: ci

# Cross-platform gate (arc1/slice5 item 5): build + load the NIF, run the full
# rebar3 test check, and run the ASan harness on both Linux and macOS. The Linux
# leg closes the deferred-Linux pile (slice-1 row 3 load, slice-3 row 6 `alsa`
# backend, slice-1 row 16 leak-half via LeakSanitizer) — provided the runner can
# supply an ALSA sequencer (see the snd-virmidi step).

on:
  push:
  pull_request:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            otp: '27'
          - os: macos-latest
            otp: '27'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: '3'

      - name: Install ALSA dev headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # mm_context_init on ALSA calls snd_seq_open, which needs a sequencer
      # device. A headless runner has no audio hardware, so load the virtual
      # sequencer module. Best-effort: if the runner kernel can't provide it, the
      # ALSA *runtime* steps below will fail and the ALSA runtime rows stay
      # disclosed-deferred — but build/link/enumeration-shape still run.
      - name: Load ALSA virtual sequencer (Linux, best-effort)
        if: runner.os == 'Linux'
        run: |
          sudo modprobe snd-seq snd-virmidi 2>/dev/null \
            && echo "snd-virmidi loaded; ALSA runtime will run" \
            || echo "::warning::no ALSA sequencer module; ALSA runtime rows deferred"
          ls -l /dev/snd/seq 2>/dev/null || echo "(no /dev/snd/seq)"

      # Full gate: compile (app + NIF), xref, dialyzer, eunit, coverage. On macOS
      # this is the same green gate slices 1-3 produce; on Linux it additionally
      # exercises context_open (row 3) and the `alsa` backend atom (row 6).
      - name: rebar3 as test check
        run: rebar3 as test check

      # ASan harness over the minimidio context lifecycle. On Linux ASan bundles
      # LeakSanitizer, so this closes the leak half of slice-1 row 16.
      - name: ASan harness
        run: make asan
